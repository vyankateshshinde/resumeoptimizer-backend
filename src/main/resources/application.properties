spring.application.name=resumeoptimizer
# Optional Job Finder scheduling settings
jobfinder.ingestion.lookback-days=7
jobfinder.ingestion.initial-delay-ms=5000
jobfinder.ingestion.fixed-delay-ms=3600000
jobfinder.alerts.initial-delay-ms=60000
jobfinder.alerts.fixed-delay-ms=900000

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.model=llama-3.3-70b-versatile

nvidia.api.url=https://integrate.api.nvidia.com/v1/chat/completions
nvidia.api.model=meta/llama-3.1-8b-instruct
nvidia.api.key=${NVIDIA_API_KEY:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080