spring.application.name=resumeoptimizer


# =====================================================
# JOB FINDER SCHEDULER
# =====================================================

jobfinder.ingestion.lookback-days=7
jobfinder.ingestion.initial-delay-ms=5000
jobfinder.ingestion.fixed-delay-ms=3600000

jobfinder.alerts.initial-delay-ms=60000
jobfinder.alerts.fixed-delay-ms=900000


# =====================================================
# JOB FINDER ADMINISTRATION
# =====================================================

jobfinder.admin.email=${JOBFINDER_ADMIN_EMAIL:}


# =====================================================
# EXPERIENCE EXTRACTION
# =====================================================

# false = rule-based extraction only
# true = AI fallback is used only for uncertain rule results
jobfinder.experience.ai-enabled=${JOBFINDER_EXPERIENCE_AI_ENABLED:false}

# AI result must have at least this confidence.
jobfinder.experience.ai-min-confidence=${JOBFINDER_EXPERIENCE_AI_MIN_CONFIDENCE:0.78}

# Rule results at or above this confidence do not call AI.
jobfinder.experience.rule-trusted-confidence=${JOBFINDER_EXPERIENCE_RULE_TRUSTED_CONFIDENCE:0.85}

# Prevent sending extremely large job descriptions to the AI provider.
jobfinder.experience.ai-max-description-characters=${JOBFINDER_EXPERIENCE_AI_MAX_DESCRIPTION_CHARACTERS:12000}


# =====================================================
# ADZUNA LIVE JOB PROVIDER
# =====================================================

jobfinder.adzuna.enabled=${ADZUNA_ENABLED:false}

jobfinder.adzuna.base-url=https://api.adzuna.com/v1/api/jobs

jobfinder.adzuna.app-id=${ADZUNA_APP_ID:}
jobfinder.adzuna.app-key=${ADZUNA_APP_KEY:}

jobfinder.adzuna.country=${ADZUNA_COUNTRY:in}
jobfinder.adzuna.currency=${ADZUNA_CURRENCY:INR}

jobfinder.adzuna.results-per-page=${ADZUNA_RESULTS_PER_PAGE:50}
jobfinder.adzuna.pages=${ADZUNA_PAGES:2}

jobfinder.adzuna.queries=${ADZUNA_QUERIES:java developer,spring boot developer,java full stack developer,backend developer}


# =====================================================
# HIMALAYAS LIVE JOB PROVIDER
# =====================================================

jobfinder.himalayas.enabled=${HIMALAYAS_ENABLED:false}

jobfinder.himalayas.search-url=https://himalayas.app/jobs/api/search

jobfinder.himalayas.country=${HIMALAYAS_COUNTRY:India}

jobfinder.himalayas.include-worldwide=${HIMALAYAS_WORLDWIDE_ONLY:false}

jobfinder.himalayas.pages=${HIMALAYAS_PAGES:2}

jobfinder.himalayas.queries=${HIMALAYAS_QUERIES:java developer,spring boot developer,java full stack developer,backend developer}


# =====================================================
# DATABASE
# =====================================================

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}


# =====================================================
# GROQ AI
# =====================================================

groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.model=llama-3.3-70b-versatile


# =====================================================
# NVIDIA AI
# =====================================================

nvidia.api.url=https://integrate.api.nvidia.com/v1/chat/completions
nvidia.api.model=meta/llama-3.1-8b-instruct
nvidia.api.key=${NVIDIA_API_KEY:}


# =====================================================
# JPA / HIBERNATE
# =====================================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# =====================================================
# MOCK JOB PROVIDER
# =====================================================

jobfinder.mock.enabled=${JOBFINDER_MOCK_ENABLED:false}


# =====================================================
# SERVER
# =====================================================

server.port=8080